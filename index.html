<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>月次収支メモ</title>
  <meta name="description" content="毎月の収入・支出・貯金を記録するシンプルな家計メモ" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="収支メモ" />
  <meta name="theme-color" content="#111b2e" />
  <link rel="manifest" href="manifest.json" />

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111b2e;
      --surface: #162038;
      --border: #2a3a5a;
      --text: #e0e8f8;
      --muted: #8899bb;
      --accent: #C9A84C;
      --blue: #5da8ff;
      --red: #ff7a7a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      padding-top: var(--safe-top);
    }
    .header-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: .03em; }

    .tabs { display: flex; gap: 4px; background: #0e1726; border-radius: 8px; padding: 3px; }
    .tab {
      padding: 5px 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .tab.active { background: var(--surface); color: var(--accent); font-weight: 700; }

    /* CONTENT */
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px calc(40px + var(--safe-bottom));
    }

    /* MONTH NAV */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .nav-btn {
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .month-label { text-align: center; }
    .year-text { display: block; font-size: 12px; color: var(--muted); }
    .month-text { display: block; font-size: 24px; font-weight: 700; }

    /* HERO CARD */
    .hero-card {
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      background: linear-gradient(135deg,#1B2A4A 60%,#243660);
    }
    .hero-card.negative { background: linear-gradient(135deg,#3a1a1a 60%,#5a2222); }
    .hero-label { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .hero-amount { font-size: 36px; font-weight: 800; letter-spacing: -.02em; font-variant-numeric: tabular-nums; margin-bottom: 10px; color: var(--accent); }
    .hero-card.negative .hero-amount { color: var(--red); }
    .hero-sub { font-size: 12px; color: var(--muted); }
    .hero-sub span + span::before { content: " − "; opacity: .5; }

    /* SECTION */
    .section {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .section-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; }
    .input-row { margin-bottom: 12px; }
    .input-row:last-child { margin-bottom: 0; }
    .field-label { display: block; font-size: 13px; color: #aab8d4; margin-bottom: 6px; }
    .input-wrap { display: flex; align-items: center; gap: 8px; }
    input[type=number], textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      outline: none;
      -webkit-appearance: none;
      font-family: inherit;
    }
    input[type=number]:focus, textarea:focus { border-color: var(--accent); }
    .unit { color: var(--muted); font-size: 14px; white-space: nowrap; }
    textarea { resize: vertical; min-height: 72px; width: 100%; }

    /* SAVE BTN */
    .save-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #111b2e;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .04em;
      font-family: inherit;
      margin-top: 4px;
    }
    .save-btn.saved { background: #3a6a3a; color: #b8f0b8; }

    /* GRAPH */
    .graph-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .graph-title { font-size: 13px; color: var(--muted); font-weight: 700; margin-bottom: 12px; letter-spacing: .06em; }
    canvas { max-width: 100%; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 6px 8px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; border-bottom: 1px solid var(--border); text-align: left; }
    th.right, td.right { text-align: right; }
    td { padding: 8px; color: var(--text); font-variant-numeric: tabular-nums; }
    tr:nth-child(even) { background: #1a2a42; }
    td.income-col { color: var(--blue); }
    td.expense-col { color: var(--red); }
    td.balance-pos { color: var(--accent); font-weight: 700; }
    td.balance-neg { color: var(--red); font-weight: 700; }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-text { color: var(--muted); font-size: 14px; line-height: 1.8; }

    /* HIDDEN */
    .hidden { display: none; }

    /* CARRYOVER */
    .carryover-section {
      background: linear-gradient(135deg, #1a2a1a, #1e3a1e);
      border: 1px solid #3a6a3a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .carryover-section .section-label { color: #7abf7a; }
    .carryover-hint { font-size: 11px; color: #7abf7a; opacity: .8; margin-top: 6px; line-height: 1.6; }
    .carryover-save-btn {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      background: #3a6a3a;
      color: #b8f0b8;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .carryover-save-btn.saved { background: #2a4a2a; opacity: .7; }

    /* LOADING */
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--muted); font-size: 16px; }
  </style>
</head>
<body>

<div id="loading">読み込み中…</div>

<div id="app" class="hidden">
  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <span class="logo">💰 月次収支メモ</span>
      <div class="tabs">
        <button class="tab active" id="tab-input" onclick="switchTab('input')">入力</button>
        <button class="tab" id="tab-graph" onclick="switchTab('graph')">推移グラフ</button>
      </div>
    </div>
  </div>

  <!-- INPUT VIEW -->
  <div id="view-input" class="content">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label">
        <span class="year-text" id="disp-year"></span>
        <span class="month-text" id="disp-month"></span>
      </div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="hero-card" id="hero-card">
      <div class="hero-label">今月の手元に残るお金</div>
      <div class="hero-amount" id="hero-amount">+0 円</div>
      <div class="hero-sub">
        <span id="hero-income">収入 0円</span>
        <span id="hero-expense">支出 0円</span>
      </div>
    </div>

    <div class="carryover-section">
      <div class="section-label">🏦 繰越残高（初回のみ）</div>
      <div class="input-row">
        <label class="field-label">アプリを使い始める前の貯蓄額</label>
        <div class="input-wrap">
          <input type="number" id="f-carryover" placeholder="0" oninput="onCarryoverInput()" />
          <span class="unit">円</span>
        </div>
      </div>
      <div class="carryover-hint">💡 最初に一度だけ入力してください。累計貯金の表示に加算されます。</div>
      <button class="carryover-save-btn" id="carryover-save-btn" onclick="saveCarryover()">繰越残高を保存</button>
    </div>

    <div class="section">
      <div class="section-label">📥 収入</div>
      <div class="input-row">
        <label class="field-label">手取り給与・その他</label>
        <div class="input-wrap">
          <input type="number" id="f-income" placeholder="0" oninput="onInput()" />
          <span class="unit">円</span>
        </div>
      </div>
      <div class="input-row">
        <label class="field-label">養育費</label>
        <div class="input-wrap">
          <input type="number" id="f-childSupport" placeholder="0" oninput="onInput()" />
          <span class="unit">円</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">📤 支出</div>
      <div class="input-row">
        <label class="field-label">クレジットカード請求額</label>
        <div class="input-wrap">
          <input type="number" id="f-creditCard" placeholder="0" oninput="onInput()" />
          <span class="unit">円</span>
        </div>
      </div>
      <div class="input-row">
        <label class="field-label">銀行からの現金引出し</label>
        <div class="input-wrap">
          <input type="number" id="f-cashWithdrawal" placeholder="0" oninput="onInput()" />
          <span class="unit">円</span>
        </div>
      </div>
      <div class="input-row">
        <label class="field-label">その他支出（任意）</label>
        <div class="input-wrap">
          <input type="number" id="f-otherExpenses" placeholder="0" oninput="onInput()" />
          <span class="unit">円</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">📝 メモ（任意）</div>
      <textarea id="f-note" placeholder="特別出費や気になることなど…"></textarea>
    </div>

    <button class="save-btn" id="save-btn" onclick="saveMonth()">この月のデータを保存</button>
  </div>

  <!-- GRAPH VIEW -->
  <div id="view-graph" class="content hidden">
    <div id="graph-empty" class="empty hidden">
      <div class="empty-icon">📊</div>
      <div class="empty-text">データがまだありません。<br />「入力」タブから各月を登録してください。</div>
    </div>

    <div id="graph-content" class="hidden">
      <!-- Total savings hero -->
      <div class="hero-card" id="total-hero">
        <div class="hero-label">貯金できた金額の累計</div>
        <div class="hero-amount" id="total-amount">+0 円</div>
        <div class="hero-sub" id="total-months">記録した 0 ヶ月分の合計</div>
        <div id="total-carryover-row" class="hero-sub" style="margin-top:6px; display:none;">
          <span id="total-carryover-label" style="color:#7abf7a;">繰越 0円 含む</span>
        </div>
      </div>

      <div class="graph-card">
        <div class="graph-title">月別 貯金できた金額</div>
        <canvas id="chart-savings" height="180"></canvas>
      </div>

      <div class="graph-card">
        <div class="graph-title">収入・支出の推移</div>
        <canvas id="chart-trend" height="180"></canvas>
      </div>

      <div class="graph-card">
        <div class="graph-title">月別サマリー</div>
        <table>
          <thead>
            <tr>
              <th>月</th>
              <th class="right">収入</th>
              <th class="right">支出</th>
              <th class="right">残高</th>
            </tr>
          </thead>
          <tbody id="summary-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'cashflow_data_v1';
const CARRYOVER_KEY = 'cashflow_carryover_v1';
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let allData = {};
let carryover = 0;
let chartSavings = null;
let chartTrend = null;
let currentView = 'input';

const fmt = n => Math.abs(n).toLocaleString('ja-JP');
const toNum = v => { const n = parseInt(String(v||'').replace(/,/g,''),10); return isNaN(n)?0:n; };
const key = (y,m) => `${y}-${m}`;

// --- Storage ---
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); } catch(e) { console.error(e); }
}
function loadCarryover() {
  try { return parseInt(localStorage.getItem(CARRYOVER_KEY) || '0', 10) || 0; } catch { return 0; }
}
function saveCarryoverData(val) {
  try { localStorage.setItem(CARRYOVER_KEY, String(val)); } catch(e) { console.error(e); }
}

// --- Init ---
window.addEventListener('DOMContentLoaded', () => {
  allData = loadData();
  carryover = loadCarryover();
  document.getElementById('f-carryover').value = carryover || '';
  if (carryover) {
    const btn = document.getElementById('carryover-save-btn');
    btn.textContent = '✓ 保存済み';
    btn.classList.add('saved');
  }
  renderInput();
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
});

// --- Tab ---
function switchTab(tab) {
  currentView = tab;
  document.getElementById('view-input').classList.toggle('hidden', tab !== 'input');
  document.getElementById('view-graph').classList.toggle('hidden', tab !== 'graph');
  document.getElementById('tab-input').classList.toggle('active', tab === 'input');
  document.getElementById('tab-graph').classList.toggle('active', tab === 'graph');
  if (tab === 'graph') renderGraph();
}

// --- Month nav ---
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderInput();
}

// --- Input ---
function renderInput() {
  document.getElementById('disp-year').textContent = currentYear + '年';
  document.getElementById('disp-month').textContent = MONTHS[currentMonth];
  const d = allData[key(currentYear, currentMonth)] || {};
  ['income','childSupport','creditCard','cashWithdrawal','otherExpenses'].forEach(f => {
    document.getElementById('f-'+f).value = d[f] || '';
  });
  document.getElementById('f-note').value = d.note || '';
  updateHero();
  const btn = document.getElementById('save-btn');
  btn.textContent = 'この月のデータを保存';
  btn.classList.remove('saved');
}

function onInput() { updateHero(); }

function onCarryoverInput() {
  const btn = document.getElementById('carryover-save-btn');
  btn.textContent = '繰越残高を保存';
  btn.classList.remove('saved');
}

function saveCarryover() {
  const val = parseInt(document.getElementById('f-carryover').value || '0', 10) || 0;
  carryover = val;
  saveCarryoverData(val);
  const btn = document.getElementById('carryover-save-btn');
  btn.textContent = '✓ 保存しました';
  btn.classList.add('saved');
}

function updateHero() {
  const inc = toNum(document.getElementById('f-income').value) + toNum(document.getElementById('f-childSupport').value);
  const exp = toNum(document.getElementById('f-creditCard').value) + toNum(document.getElementById('f-cashWithdrawal').value) + toNum(document.getElementById('f-otherExpenses').value);
  const bal = inc - exp;
  const pos = bal >= 0;
  const hero = document.getElementById('hero-card');
  hero.classList.toggle('negative', !pos);
  document.getElementById('hero-amount').textContent = (pos ? '+' : '−') + fmt(bal) + ' 円';
  document.getElementById('hero-amount').style.color = pos ? '#C9A84C' : '#ff8a8a';
  document.getElementById('hero-income').textContent = '収入 ' + fmt(inc) + '円';
  document.getElementById('hero-expense').textContent = '支出 ' + fmt(exp) + '円';
}

function saveMonth() {
  const d = {};
  ['income','childSupport','creditCard','cashWithdrawal','otherExpenses'].forEach(f => {
    d[f] = document.getElementById('f-'+f).value;
  });
  d.note = document.getElementById('f-note').value;
  allData[key(currentYear, currentMonth)] = d;
  saveData();
  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ 保存しました';
  btn.classList.add('saved');
}

// --- Graph ---
function getGraphData() {
  const result = [];
  for (let i = 11; i >= 0; i--) {
    let m = currentMonth - i;
    let y = currentYear;
    while (m < 0) { m += 12; y--; }
    const k = key(y, m);
    const d = allData[k];
    if (!d) continue;
    const inc = toNum(d.income) + toNum(d.childSupport);
    const exp = toNum(d.creditCard) + toNum(d.cashWithdrawal) + toNum(d.otherExpenses);
    const label = (y !== today.getFullYear() ? y + '/' : '') + MONTHS[m];
    result.push({ label, inc, exp, bal: inc - exp });
  }
  return result;
}

function renderGraph() {
  const data = getGraphData();
  const empty = document.getElementById('graph-empty');
  const content = document.getElementById('graph-content');

  if (data.length === 0) {
    empty.classList.remove('hidden');
    content.classList.add('hidden');
    return;
  }
  empty.classList.add('hidden');
  content.classList.remove('hidden');

  // Total savings
  const monthlySavings = Object.values(allData).reduce((sum, d) => {
    return sum + (toNum(d.income) + toNum(d.childSupport)) - (toNum(d.creditCard) + toNum(d.cashWithdrawal) + toNum(d.otherExpenses));
  }, 0);
  const totalSavings = monthlySavings + carryover;
  const totalMonths = Object.keys(allData).length;
  const totalPos = totalSavings >= 0;
  document.getElementById('total-hero').classList.toggle('negative', !totalPos);
  document.getElementById('total-amount').textContent = (totalPos ? '+' : '−') + fmt(totalSavings) + ' 円';
  document.getElementById('total-amount').style.color = totalPos ? '#C9A84C' : '#ff8a8a';
  document.getElementById('total-months').textContent = '記録した ' + totalMonths + ' ヶ月分の合計';
  const carryoverRow = document.getElementById('total-carryover-row');
  if (carryover > 0) {
    carryoverRow.style.display = 'block';
    document.getElementById('total-carryover-label').textContent = '繰越 ' + fmt(carryover) + '円 含む';
  } else {
    carryoverRow.style.display = 'none';
  }

  const labels = data.map(d => d.label);
  const chartOpts = {
    responsive: true,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmt(ctx.raw) + '円' } } },
    scales: {
      x: { ticks: { color: '#8899bb', font: { size: 11 } }, grid: { color: '#2a3a5a' } },
      y: { ticks: { color: '#8899bb', font: { size: 11 }, callback: v => (v/10000).toFixed(0) + '万' }, grid: { color: '#2a3a5a' } }
    }
  };

  // Bar chart – savings
  if (chartSavings) chartSavings.destroy();
  chartSavings = new Chart(document.getElementById('chart-savings'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: data.map(d => d.bal),
        backgroundColor: data.map(d => d.bal >= 0 ? '#C9A84C' : '#ff7a7a'),
        borderRadius: 4,
      }]
    },
    options: { ...chartOpts, plugins: { ...chartOpts.plugins, tooltip: { callbacks: { label: ctx => (ctx.raw >= 0 ? '+' : '−') + fmt(ctx.raw) + '円' } } } }
  });

  // Line chart – trend
  if (chartTrend) chartTrend.destroy();
  chartTrend = new Chart(document.getElementById('chart-trend'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '収入', data: data.map(d => d.inc), borderColor: '#5da8ff', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#5da8ff' },
        { label: '支出', data: data.map(d => d.exp), borderColor: '#ff7a7a', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#ff7a7a' }
      ]
    },
    options: { ...chartOpts, plugins: { legend: { display: true, labels: { color: '#8899bb', boxWidth: 12 } }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmt(ctx.raw) + '円' } } } }
  });

  // Summary table
  const tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = data.map(d => {
    const pos = d.bal >= 0;
    return `<tr>
      <td>${d.label}</td>
      <td class="right income-col">${fmt(d.inc)}</td>
      <td class="right expense-col">${fmt(d.exp)}</td>
      <td class="right ${pos ? 'balance-pos' : 'balance-neg'}">${pos ? '+' : '−'}${fmt(d.bal)}</td>
    </tr>`;
  }).join('');
}
</script>

</body>
</html>
